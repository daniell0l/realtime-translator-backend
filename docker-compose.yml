services:
  postgres:
    image: postgres:18-alpine
    container_name: realtime_translator_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-realtime_translator}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - '127.0.0.1:${DB_PORT:-5433}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-realtime_translator}']
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  postgres_data:
